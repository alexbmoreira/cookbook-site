name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    name: Firebase Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: cd client && npm install && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          FONTAWESOME_NPM_TOKEN: ${{ secrets.FONTAWESOME_NPM_TOKEN }}
      - name: Write functions .env
        run: |
          echo "API_BASE=${{ secrets.VITE_API_URL }}" > client/functions/.env
      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_COOKBOOK_13 }}' > /tmp/firebase-sa.json
      - name: Install function dependencies
        run: cd client/functions && npm install
      - name: Deploy Cloud Functions
        run: cd client && npx firebase-tools deploy --force --only functions --project cookbook-13
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_COOKBOOK_13 }}'
          channelId: live
          projectId: cookbook-13
          entrypoint: ./client
